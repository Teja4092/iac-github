name: "Labeler"
on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
      - feature/*

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Labeler
        uses: actions/labeler@v3
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
